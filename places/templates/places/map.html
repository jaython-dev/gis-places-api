<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIS Places Map</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        #map {
            height: 100vh;
            width: 100vw;
        }
        .controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            max-width: 300px;
        }
        h3 { margin-top: 0; }
        button {
            padding: 8px 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #status {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="controls">
        <h3>Find Places</h3>
        
        <!-- Location Search Section -->
        <div style="margin-bottom: 15px;">
            <label style="font-weight: bold;">1. Set Search Center</label>
            <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                <input type="text" id="search-query" placeholder="e.g. London" style="flex: 1; padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
                <button onclick="searchLocation()" style="background-color: #28a745; width: auto; margin: 0;">Search</button>
            </div>
            <button onclick="getUserLocation()" style="margin-bottom: 5px;">Use My GPS Location</button>
            <p style="font-size: 11px; color: #666; margin: 0;">Or click anywhere on the map to set a pin.</p>
        </div>
        
        <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
        
        <!-- Places Search Section -->
        <div style="margin-bottom: 5px;">
            <label style="font-weight: bold;">2. Find Nearby Places</label>
            <label style="margin-bottom: 10px;">Search Radius (m): <input type="number" id="radius" value="5000" style="width: 80px; padding: 3px; border: 1px solid #ccc; border-radius: 4px;"></label>
            <button onclick="fetchPlaces()" style="margin-bottom: 0;">Search Area For Places</button>
        </div>
        
        <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
        
        <!-- Routing Section -->
        <div style="margin-bottom: 5px;">
            <label style="font-weight: bold;">3. Get Directions</label>
            <p style="font-size: 11px; color: #666; margin: 0 0 5px 0;">Right-click anywhere on the map to set a Destination, then:</p>
            <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                <select id="vehicle-type" style="flex: 1; padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
                    <option value="car">Car</option>
                    <option value="foot">Walking</option>
                    <option value="bicycle">Bicycle</option>
                </select>
                <button onclick="fetchRoute()" style="background-color: #ff9800; margin-bottom: 0; width: auto;">Calculate Route</button>
            </div>
        </div>
        <div id="status"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map centered on Monaco by default
        let map = L.map('map').setView([43.73, 7.41], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let userMarker;
        let destMarker;
        let routeLayer;
        let searchCircle;
        let placeMarkers = L.layerGroup().addTo(map);
        let currentLat = null;
        let currentLng = null;
        let destLat = null;
        let destLng = null;

        const redIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });
        
        const blueIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        function setUserLocation(lat, lng, zoom = null) {
            currentLat = lat;
            currentLng = lng;
            let radius = parseInt(document.getElementById('radius').value) || 5000;
            
            if (userMarker) {
                userMarker.setLatLng([lat, lng]).bindPopup('Search Center').openPopup();
            } else {
                userMarker = L.marker([lat, lng], {icon: redIcon}).addTo(map).bindPopup('Search Center').openPopup();
            }
            
            if (searchCircle) {
                searchCircle.setLatLng([lat, lng]);
                searchCircle.setRadius(radius);
            } else {
                searchCircle = L.circle([lat, lng], {
                    color: '#28a745',
                    fillColor: '#28a745',
                    fillOpacity: 0.1,
                    radius: radius,
                    weight: 1
                }).addTo(map);
            }
            
            if (zoom) {
                map.setView([lat, lng], zoom);
            }
        }

        // Update the circle radius when the input changes
        document.getElementById('radius').addEventListener('input', function(e) {
            if (searchCircle && currentLat !== null && currentLng !== null) {
                searchCircle.setRadius(parseInt(e.target.value) || 5000);
            }
        });

        function getUserLocation() {
            if (navigator.geolocation) {
                document.getElementById('status').innerText = 'Getting location...';
                navigator.geolocation.getCurrentPosition(position => {
                    setUserLocation(position.coords.latitude, position.coords.longitude, 13);
                    document.getElementById('status').innerText = 'Location found.';
                }, error => {
                    document.getElementById('status').innerText = 'Error getting location.';
                });
            } else {
                alert('Geolocation is not supported by this browser.');
            }
        }

        // Allow setting location by clicking on map
        map.on('click', function(e) {
            setUserLocation(e.latlng.lat, e.latlng.lng);
            document.getElementById('status').innerText = 'Custom search location selected.';
        });

        // Allow setting destination by right-clicking (contextmenu)
        map.on('contextmenu', function(e) {
            destLat = e.latlng.lat;
            destLng = e.latlng.lng;
            
            if (destMarker) {
                destMarker.setLatLng(e.latlng).bindPopup('Destination').openPopup();
            } else {
                destMarker = L.marker(e.latlng, {icon: blueIcon}).addTo(map).bindPopup('Destination').openPopup();
            }
            document.getElementById('status').innerText = 'Destination selected. You can now Calculate Route.';
        });

        function setDestinationAndRoute(lat, lng) {
            destLat = lat;
            destLng = lng;
            
            if (destMarker) {
                destMarker.setLatLng([lat, lng]).bindPopup('Destination').openPopup();
            } else {
                destMarker = L.marker([lat, lng], {icon: blueIcon}).addTo(map).bindPopup('Destination').openPopup();
            }
            
            map.closePopup();
            fetchRoute();
        }

        async function searchLocation() {
            let query = document.getElementById('search-query').value;
            if (!query) {
                alert("Please enter a location to search");
                return;
            }
            
            document.getElementById('status').innerText = 'Searching for location...';
            try {
                let response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`);
                let data = await response.json();
                if (data && data.length > 0) {
                    let lat = parseFloat(data[0].lat);
                    let lon = parseFloat(data[0].lon);
                    setUserLocation(lat, lon, 13);
                    document.getElementById('status').innerText = `Centered on: ${data[0].name || data[0].display_name}`;
                } else {
                    document.getElementById('status').innerText = 'Location not found.';
                }
            } catch (err) {
                document.getElementById('status').innerText = 'Error searching location.';
                console.error(err);
            }
        }

        async function fetchPlaces() {
            if (currentLat === null || currentLng === null) {
                alert('Please set a location first (click "Find My Location" or click on the map)!');
                return;
            }
            
            let radius = document.getElementById('radius').value;
            document.getElementById('status').innerText = 'Loading places...';
            
            try {
                let response = await fetch(`/api/places/nearby?lat=${currentLat}&lng=${currentLng}&radius=${radius}`);
                let data = await response.json();
                
                placeMarkers.clearLayers();
                
                if (data.results && data.results.features && data.results.features.length > 0) {
                    data.results.features.forEach(feature => {
                        let coords = feature.geometry.coordinates;
                        let props = feature.properties;
                        // GeoJSON coords are [lng, lat]
                        
                        let popupContent = `
                            <div style="text-align: center;">
                                <b>${props.name}</b><br>
                                <span style="color: #666; font-size: 12px;">${props.place_type || 'Place'} (${props.distance_m}m)</span><br><br>
                                <button onclick="setDestinationAndRoute(${coords[1]}, ${coords[0]})" style="background-color: #ff9800; padding: 5px 10px; font-size: 12px; margin: 0; width: 100%;">Directions Here</button>
                            </div>
                        `;

                        L.marker([coords[1], coords[0]])
                            .bindPopup(popupContent)
                            .addTo(placeMarkers);
                    });
                    document.getElementById('status').innerText = `Found ${data.count} places.`;
                } else {
                    document.getElementById('status').innerText = 'No places found.';
                }
            } catch (err) {
                document.getElementById('status').innerText = 'Error loading places.';
                console.error(err);
            }
        }

        async function fetchRoute() {
            if (currentLat === null || currentLng === null) {
                alert('Please set a starting location (Source)!');
                return;
            }
            if (destLat === null || destLng === null) {
                alert('Please set a destination by right-clicking on the map!');
                return;
            }

            let vehicle = document.getElementById('vehicle-type').value;
            document.getElementById('status').innerText = `Calculating ${vehicle} route...`;
            try {
                let response = await fetch(`/api/route?source_lat=${currentLat}&source_lng=${currentLng}&dest_lat=${destLat}&dest_lng=${destLng}&vehicle=${vehicle}`);
                let data = await response.json();

                if (response.ok) {
                    if (routeLayer) {
                        map.removeLayer(routeLayer);
                    }
                    
                    // Render the GeoJSON route geometry
                    let routeColor = '#007bff'; // blue for car
                    if (vehicle === 'foot') routeColor = '#28a745'; // green for foot
                    if (vehicle === 'bicycle') routeColor = '#6f42c1'; // purple for bicycle

                    routeLayer = L.geoJSON(data.route_geometry, {
                        style: {
                            color: routeColor,
                            weight: 5,
                            opacity: 0.7
                        }
                    }).addTo(map);

                    // Fit map bounds to the route
                    map.fitBounds(routeLayer.getBounds());

                    document.getElementById('status').innerHTML = `Route found! <br>Distance: ${data.total_distance_km} km <br>Time: ${data.estimated_duration_min} min`;
                } else {
                    document.getElementById('status').innerText = data.error || 'No route found.';
                }
            } catch (err) {
                document.getElementById('status').innerText = 'Error calculating route.';
                console.error(err);
            }
        }

        // Try to get location on load
        getUserLocation();
    </script>
</body>
</html>
